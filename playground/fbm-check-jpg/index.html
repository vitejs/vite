<h1>FBM check: .jpg / .jpeg static asset</h1>

<div class="app"></div>
<!-- the imported asset URL strings are rendered here so the spec can read them -->
<pre class="jpg-url"></pre>
<pre class="jpeg-url"></pre>

     to the real served bytes (and, after an edit, whether they refresh or freeze) -->

<pre class="jpeg-fetched"></pre>
